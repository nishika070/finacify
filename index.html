<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="title">
        <div class="brand">
            <div class="branding">
                <img class="logo" src="./reference/logo.svg" alt="logo"/>

                <div class="head-text">
                    <h1>FINANCIFY</h1>
                    <p>Track your spending with ease</p>
                </div>
            </div>
        </div>

        <div class="navbar">
            <nav>
                <a href="index.html">DASHBOARD</a>
                <a href="income.html">INCOME</a>
                <a href="expense.html">EXPENSE</a>
            </nav>
        </div>
    </header>

    <main>

        <section class="primary-card">

            <div class="card">
                <h3>Total Income</h3>
                <div class="total-income" id="total-income">
                    <p>0</p>
                </div>
            </div>

            <div class="card">
                <h3>Total Expenses</h3>
                <div class="total-expenses" id="total-expense">
                    <p>0</p>
                </div>
            </div>

            <div class="card">
                <h3>Net Savings</h3>
                <div class="net-savings" id="net-saving">
                    <p>0</p>
                </div>
            </div>

            <div class="card">
                <h3>Savings Rate</h3>
                <div class="savings-rate" id="savings-rate">
                    <p>0</p>
                </div>
            </div>

        </section>

        <section class="secondary-card">

            <div class="card">

                <div class="search-bar">
                    <h2>Transaction Record</h2>
                    <input
                        id="transaction-search"
                        type="search"
                        placeholder="Search"
                    >
                </div>

                <ul id="transaction-list">
                </ul>
                <div class="selected">
                    <button id="left"><</button>
                    <span id="count"></span>
                    <button id="right">></button>
                </div>

            </div>

            <div class="card chart-card">

                <div class="search-bar">
                    <h2>Spending By Category</h2>
                </div>

                <canvas id="spending-chart">
                    
                </canvas>

            </div>

        </section>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
        <script src="./js/dashboard.js"></script>

    </main>

</body>
</html>
